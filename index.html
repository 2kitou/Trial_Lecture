<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGU Trial Lecture | Case File #001</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:wght@400;700&display=swap');
        
        body { background-color: #0f172a; }
        .font-handwriting { font-family: 'Permanent Marker', cursive; }
        .font-mono { font-family: 'Courier Prime', monospace; }
        
        .paper-noise {
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-fade { animation: fade-in 0.5s ease-out forwards; }
        .animate-slide { animation: slide-in 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MISSIONS = [
            { id: "alpha", identity: "Threat of New Entrants", intel: "Mixue is highly profitable. They have established high 'barriers to entry' including prime real estate, massive supply chains, and a loyal customer base.", mission: "Bypass their defenses. Formulate 2 creative strategies to launch a rival brand and capture their market share WITHOUT requiring massive upfront capital." },
            { id: "bravo", identity: "Threat of Substitutes", intel: "You intend to capture Mixue's market share, but you are strictly prohibited from selling milk tea, ice cream, or direct beverage equivalents.", mission: "Make their core product irrelevant. Formulate a completely different product or experience that serves the exact same consumer need. How do you divert their Gen-Z demographic?" },
            { id: "charlie", identity: "Bargaining Power of Suppliers", intel: "You control the only supply chain in the city capable of producing their signature tea leaves and ingredients. Mixue is entirely dependent on your shipments to operate.", mission: "Maximize your margins. Formulate 2 aggressive operational strategies to extract more revenue from Mixue without forcing the company into immediate bankruptcy." },
            { id: "delta", identity: "Bargaining Power of Buyers", intel: "You influence the purchasing decisions of thousands of local students via social media. You are no longer willing to pay current prices for their products.", mission: "Manipulate the market dynamics. Formulate a strategy to organize the buyer base and force Mixue to implement aggressive discounts or VIP tiers. What leverage will you use?" },
            { id: "echo", identity: "Rivalry Among Existing Competitors", intel: "You are the primary direct competitor to Mixue, located on the exact same street. Your goal is to acquire 50% of their daily foot traffic this month.", mission: "You CANNOT initiate a price war (this destroys profit margins). Formulate 2 strategies to outcompete them based on differentiation or superior value, not lower prices." }
        ];

        function App() {
            const [view, setView] = useState('map');
            const [activeMission, setActiveMission] = useState(null);
            const [phase, setPhase] = useState('grouping');
            const [timeLeft, setTimeLeft] = useState(120);
            const timerRef = useRef(null);

            const startMission = (mission) => {
                setActiveMission(mission);
                setPhase('grouping');
                setTimeLeft(120);
                setView('dossier');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            useEffect(() => {
                if (view === 'dossier') {
                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                if (phase === 'grouping') {
                                    setPhase('pitching');
                                    return 300;
                                } else {
                                    clearInterval(timerRef.current);
                                    return 0;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [view, phase]);

            const skipToPitching = () => {
                setPhase('pitching');
                setTimeLeft(300);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-2 sm:p-8 font-sans selection:bg-blue-100 overflow-x-hidden">
                    <div className="relative w-full max-w-3xl my-8">
                        {/* Folder Body */}
                        <div className="relative bg-[#00205B] rounded-xl sm:rounded-2xl shadow-2xl overflow-hidden border-l-[6px] sm:border-l-[12px] border-[#00153d]">
                            <div className="p-1 sm:p-4">
                                <div className="relative bg-[#faf9f6] rounded-sm shadow-inner min-h-[600px] flex flex-col p-4 sm:p-12">
                                    <div className="absolute inset-0 pointer-events-none paper-noise"></div>
                                    <div className="absolute top-4 left-4 sm:top-6 sm:left-6 w-8 sm:w-10 h-1 bg-slate-400/30 rounded-full rotate-12 shadow-sm"></div>

                                    {/* Header */}
                                    <div className="border-b-[2px] sm:border-b-[3px] border-slate-900 pb-4 sm:pb-6 mb-6 sm:mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                                        <div className="w-full">
                                            <div className="mb-2">
                                                <span className="bg-red-700 text-white font-mono font-bold text-[8px] sm:text-[9px] px-2 py-0.5 tracking-widest uppercase inline-block">Classified</span>
                                            </div>
                                            <h1 className="text-2xl sm:text-4xl font-serif font-black text-[#00205B] uppercase leading-none tracking-tight">Strategy Lab</h1>
                                            <p className="font-mono text-[8px] sm:text-[10px] font-bold text-slate-500 mt-2 uppercase tracking-widest leading-tight">VGU Faculty of Economics and Management // BBA & BFA Dept</p>
                                        </div>
                                        <div className="w-full sm:w-auto text-left sm:text-right font-mono text-[8px] sm:text-[10px] text-slate-900 space-y-0.5 sm:space-y-1 border-t sm:border-t-0 pt-2 sm:pt-0 border-slate-200">
                                            <div className="flex justify-between sm:justify-end gap-3 uppercase"><span>Ref:</span> <span className="font-black">VGU-STRAT-001</span></div>
                                            <div className="flex justify-between sm:justify-end gap-3 uppercase"><span>Date:</span> <span className="font-black">29 MAR 2026</span></div>
                                        </div>
                                    </div>

                                    {view === 'map' && (
                                        <div className="flex-1 animate-fade">
                                            <div className="mb-6 sm:mb-8">
                                                <h2 className="text-lg sm:text-xl font-serif font-bold text-slate-900 border-l-4 border-[#00205B] pl-3 sm:pl-4 py-1">Floor Plan Schematic</h2>
                                                <p className="text-[10px] sm:text-[11px] text-slate-500 font-mono mt-2 sm:ml-5 leading-relaxed">Select your physical sector to initialize the mission briefing.</p>
                                            </div>

                                            <div className="bg-white rounded border-2 sm:border-[3px] border-slate-200 p-4 sm:p-10 relative overflow-hidden shadow-md">
                                                <div className="absolute inset-0 opacity-[0.1] pointer-events-none" style={{ backgroundImage: 'linear-gradient(#00205B 1px, transparent 1px), linear-gradient(90deg, #00205B 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                                                <div className="relative z-10">
                                                    <div className="w-full bg-slate-50 border border-slate-900 py-3 sm:py-4 flex items-center justify-center mb-6 sm:mb-12 rounded-sm text-center">
                                                        <span className="text-slate-900 font-mono text-[9px] sm:text-xs font-black tracking-[0.3em] sm:tracking-[0.6em] uppercase">Lecturer / Presentation Screen</span>
                                                    </div>

                                                    <div className="grid grid-cols-[1fr,15px,1.2fr,15px,1fr] sm:grid-cols-[1fr,60px,1.4fr,60px,1fr] items-stretch gap-1">
                                                        <div className="flex flex-col gap-3 sm:gap-6">
                                                            <button onClick={() => startMission(MISSIONS[0])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-6 border border-slate-900 bg-white active:bg-slate-900 active:text-white sm:hover:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[8px] text-slate-400 group-hover:text-slate-500 font-bold mb-1 tracking-tighter sm:tracking-widest uppercase">Sec_Alpha</span>
                                                                <span className="text-slate-900 group-active:text-white sm:group-hover:text-white text-[9px] sm:text-xs font-black uppercase text-center">F_Left</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[3])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-6 border border-slate-900 bg-white active:bg-slate-900 active:text-white sm:hover:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[8px] text-slate-400 group-hover:text-slate-500 font-bold mb-1 tracking-tighter sm:tracking-widest uppercase">Sec_Delta</span>
                                                                <span className="text-slate-900 group-active:text-white sm:group-hover:text-white text-[9px] sm:text-xs font-black uppercase text-center">B_Left</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l border-slate-200"></div></div>
                                                        <div className="flex flex-col">
                                                            <button onClick={() => startMission(MISSIONS[2])} className="flex-1 group relative flex flex-col items-center justify-center px-1 py-6 sm:p-8 border-2 sm:border-[4px] border-slate-900 bg-slate-50 active:bg-slate-900 active:text-white sm:hover:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[7px] sm:text-[10px] text-slate-400 group-hover:text-slate-500 font-bold mb-1 sm:mb-2 tracking-tighter sm:tracking-[0.3em] uppercase">Sec_Charlie</span>
                                                                <span className="text-slate-900 group-active:text-white sm:group-hover:text-white text-[10px] sm:text-base font-black uppercase text-center leading-tight">Center<br/>Axis</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l border-slate-200"></div></div>
                                                        <div className="flex flex-col gap-3 sm:gap-6">
                                                            <button onClick={() => startMission(MISSIONS[1])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-6 border border-slate-900 bg-white active:bg-slate-900 active:text-white sm:hover:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[8px] text-slate-400 group-hover:text-slate-500 font-bold mb-1 tracking-tighter sm:tracking-widest uppercase">Sec_Bravo</span>
                                                                <span className="text-slate-900 group-active:text-white sm:group-hover:text-white text-[9px] sm:text-xs font-black uppercase text-center">F_Right</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[4])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-6 border border-slate-900 bg-white active:bg-slate-900 active:text-white sm:hover:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[8px] text-slate-400 group-hover:text-slate-500 font-bold mb-1 tracking-tighter sm:tracking-widest uppercase">Sec_Echo</span>
                                                                <span className="text-slate-900 group-active:text-white sm:group-hover:text-white text-[9px] sm:text-xs font-black uppercase text-center">B_Right</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {view === 'dossier' && activeMission && (
                                        <div className="flex-1 animate-slide flex flex-col">
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] select-none">
                                                <div className="text-[60px] sm:text-[100px] font-serif font-black -rotate-45 uppercase border-4 sm:border-8 border-slate-900 px-4 sm:px-10">Restricted</div>
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-[1fr,240px] gap-6 sm:gap-10">
                                                <div className="space-y-6 sm:space-y-8">
                                                    <section>
                                                        <h3 className="text-[9px] sm:text-[10px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1 uppercase">Competitor Entity</h3>
                                                        <p className="text-2xl sm:text-3xl font-serif font-black text-[#00205B]">Mixue Ice Cream & Tea</p>
                                                    </section>
                                                    <section>
                                                        <h3 className="text-[9px] sm:text-[10px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1 uppercase">Assigned Framework</h3>
                                                        <div className="text-xl sm:text-2xl font-black text-slate-900 border-l-4 border-slate-900 pl-3 sm:pl-4 py-1">{activeMission.identity}</div>
                                                    </section>
                                                    <section className="bg-slate-100/50 p-4 sm:p-5 border border-slate-200">
                                                        <h3 className="text-[9px] sm:text-[10px] font-mono font-black text-slate-500 uppercase tracking-widest mb-2 uppercase">Intelligence Briefing</h3>
                                                        <p className="text-slate-800 font-serif leading-relaxed text-[13px] sm:text-sm">{activeMission.intel}</p>
                                                    </section>
                                                    <section className="bg-white p-5 sm:p-6 border-2 border-slate-900 shadow-sm">
                                                        <h3 className="text-[9px] sm:text-[10px] font-mono font-black text-slate-400 uppercase tracking-widest mb-2 uppercase">Direct Task</h3>
                                                        <p className="font-bold text-slate-900 text-[13px] sm:text-sm leading-relaxed italic">"{activeMission.mission}"</p>
                                                    </section>
                                                </div>

                                                <div className="space-y-6 sm:space-y-8">
                                                    <div className="bg-[#fefce8] p-4 sm:p-5 shadow-sm border border-yellow-200 relative">
                                                        <div className="w-full h-1 bg-yellow-300 absolute top-0 left-0"></div>
                                                        <h4 className="font-mono text-[9px] sm:text-[10px] font-black text-amber-900 uppercase mb-2 underline decoration-2 underline-offset-4 uppercase">Team Protocol</h4>
                                                        <p className="text-[11px] sm:text-[12px] font-handwriting text-amber-950 font-semibold leading-relaxed">Organize into a Team (2-3 personnel). Synthesize a concise 2 minutes strategic pitch.</p>
                                                    </div>

                                                    <div className="bg-white p-4 sm:p-5 rounded-sm border-2 border-slate-900 shadow-md">
                                                        <div className="mb-3 border-b border-slate-100 pb-2">
                                                            <span className="text-[8px] sm:text-[9px] font-mono font-black text-slate-400 uppercase tracking-widest uppercase">{phase === 'grouping' ? 'Phase: Formation' : 'Phase: Synthesis'}</span>
                                                        </div>
                                                        <div className={`text-4xl sm:text-5xl font-mono font-black tracking-tighter text-center py-2 ${timeLeft <= 10 ? 'text-red-600 animate-pulse' : phase === 'grouping' ? 'text-blue-600' : 'text-slate-900'}`}>{formatTime(timeLeft)}</div>
                                                        <div className="mt-4">
                                                            {phase === 'grouping' ? (
                                                                <button onClick={skipToPitching} className="w-full py-3 bg-slate-900 text-white text-[10px] font-mono font-black uppercase active:bg-slate-700 tracking-widest rounded-sm">Commence Synthesis</button>
                                                            ) : (
                                                                <div className="text-[8px] text-center text-slate-500 font-mono py-2 uppercase font-black tracking-[0.2em] animate-pulse">Analysis Ongoing</div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <button onClick={() => { setView('map'); window.scrollTo({ top: 0 }); }} className="w-full text-[10px] font-mono font-black text-slate-400 active:text-slate-900 uppercase tracking-widest py-4 border-t border-slate-100 mt-2">[ Return to Schematic ]</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-auto pt-8 sm:pt-10 flex justify-between items-end opacity-50">
                                        <div className="w-10 h-10 sm:w-14 sm:h-14 border-2 sm:border-4 border-slate-900 flex flex-col items-center justify-center text-slate-900 font-black leading-none">
                                            <span className="text-[5px] sm:text-[7px] font-mono uppercase">VGU</span>
                                            <span className="text-[10px] sm:text-[14px]">001</span>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[7px] sm:text-[8px] font-mono font-black text-slate-900 uppercase tracking-widest">VGU Faculty of Economics and Management</div>
                                            <div className="text-[7px] sm:text-[8px] font-mono text-slate-600 mt-1 uppercase underline decoration-1">BBA & BFA-LAB-2026</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
