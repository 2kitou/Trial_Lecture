<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGU Trial Lecture | Case File #001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap');
        
        body { background-color: #0f172a; }
        .font-handwriting { font-family: 'Permanent Marker', cursive; }
        .font-mono { font-family: 'Courier Prime', monospace; }
        .font-typewriter { font-family: 'Special Elite', system-ui; }
        
        /* Skeuomorphic Textures */
        .paper-noise {
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .folder-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23f)' opacity='0.1'/%3E%3C/svg%3E");
        }

        .tab-shape {
            clip-path: polygon(0% 100%, 15% 0%, 85% 0%, 100% 100%);
        }

        .stamp {
            transform: rotate(-12deg);
            mix-blend-mode: multiply;
            mask-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence baseFrequency='0.5'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23f)'/%3E%3C/svg%3E");
        }

        .staple {
            background: linear-gradient(90deg, #94a3b8 0%, #cbd5e1 50%, #94a3b8 100%);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-fade { animation: fade-in 0.5s ease-out forwards; }
        .animate-slide { animation: slide-in 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // UPDATED: High school friendly vocabulary, keeping the 5 Forces concept
        const MISSIONS = [
            { id: "entrants", identity: "Threat of New Entrants", intel: "A huge global drink company is about to open new stores in Vietnam. They want to steal our customers by copying our cheap prices and grabbing the best store locations.", mission: "Defend our turf! Come up with 2 creative ideas to make it super hard for them to open their stores, so they give up before they even get started." },
            { id: "substitutes", identity: "Threat of Substitutes", intel: "Teens are starting to spend their pocket money on trendy new activities and healthy snacks instead of buying our sweet milk tea and ice cream.", mission: "Beat the alternatives! Create a plan to update our menu or make our stores more fun, so young people still want to spend their money at Mixue." },
            { id: "suppliers", identity: "Bargaining Power of Suppliers", intel: "The factory that sells us our special tea leaves and milk powder just raised their prices by 30%. Since we rely on them completely, this could ruin our cheap prices!", mission: "Take back control! Think of 2 smart ways to rely less on this one supplier so we can force them to lower their prices back down, without running out of ingredients." },
            { id: "buyers", identity: "Bargaining Power of Buyers", intel: "Thousands of local students are teaming up on TikTok to boycott Mixue. They are demanding VIP memberships, healthier drinks, and huge student discounts.", mission: "Win them back! Come up with a strategy to make the students happy and loyal again, BUT you can't just give everything away for free and lose all our money." },
            { id: "competitors", identity: "Rivalry Among Existing Competitors", intel: "Rival milk tea shops on our street are copying our menu and trying to steal our daily customers. The street is getting way too crowded with drink shops.", mission: "Crush the competition! We CANNOT lower our prices (they are already as low as possible). Think of 2 ways to make Mixue stand out and keep our customers loyal." }
        ];

        function App() {
            const [view, setView] = useState('map');
            const [activeMission, setActiveMission] = useState(null);
            const [phase, setPhase] = useState('grouping');
            const [timeLeft, setTimeLeft] = useState(120);
            const timerRef = useRef(null);

            const startMission = (mission) => {
                setActiveMission(mission);
                setPhase('grouping');
                setTimeLeft(120);
                setView('dossier');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            useEffect(() => {
                if (view === 'dossier') {
                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                if (phase === 'grouping') {
                                    setPhase('planning');
                                    return 300; 
                                } else {
                                    clearInterval(timerRef.current);
                                    return 0;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [view, phase]);

            const skipToPlanning = () => {
                setPhase('planning');
                setTimeLeft(300);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-2 sm:p-12 font-sans selection:bg-blue-200 overflow-x-hidden">
                    <div className="relative w-full max-w-4xl py-6 sm:py-0">
                        
                        {/* Staggered Folder Tab */}
                        <div className="absolute -top-7 sm:-top-8 left-8 sm:left-12 w-32 sm:w-48 h-8 sm:h-10 bg-[#00205B] tab-shape z-0 flex items-center justify-center shadow-lg border-t border-blue-400/20">
                            <span className="text-[#faf9f6]/40 font-mono text-[8px] sm:text-[10px] tracking-[0.2em] sm:tracking-[0.3em] font-bold uppercase mt-1">STRAT_LOG_001</span>
                        </div>

                        {/* Folder Body */}
                        <div className="relative bg-[#00205B] rounded-tr-2xl rounded-br-2xl rounded-bl-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] sm:shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)] overflow-hidden border-l-[10px] sm:border-l-[16px] border-[#00153d]">
                            <div className="absolute inset-0 folder-texture pointer-events-none"></div>
                            
                            <div className="p-1.5 sm:p-6">
                                <div className="relative bg-[#faf9f6] rounded-sm shadow-2xl min-h-[600px] sm:min-h-[700px] flex flex-col p-4 pt-8 sm:p-16 border-t border-white/50">
                                    <div className="absolute inset-0 pointer-events-none paper-noise"></div>
                                    
                                    <div className="absolute top-4 left-6 sm:top-6 sm:left-12 w-4 h-1 sm:w-6 sm:h-1.5 staple rounded-sm rotate-[-15deg] z-10"></div>
                                    <div className="absolute top-5 left-6 sm:top-8 sm:left-12 w-4 h-1 sm:w-6 sm:h-1.5 staple rounded-sm rotate-[-12deg] z-10"></div>
                                    
                                    <div className="absolute -top-3 right-6 sm:right-20 z-20 transform scale-75 sm:scale-100">
                                        <div className="absolute top-0 right-1/2 w-4 h-16 border-4 border-slate-400 rounded-full opacity-60"></div>
                                        <div className="relative bg-red-800 text-white px-3 py-1 font-mono text-[10px] font-black uppercase tracking-tighter shadow-md rotate-3 flex items-center gap-2 border border-red-900">
                                            <div className="w-1.5 h-1.5 bg-white rounded-full"></div>
                                            Confidential
                                        </div>
                                    </div>

                                    {/* Header Section */}
                                    <div className="border-b-[2px] sm:border-b-[3px] border-slate-900 pb-6 mb-6 sm:pb-8 sm:mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 sm:gap-6 relative">
                                        <div className="w-full">
                                            <div className="mb-2 sm:mb-3 flex items-center gap-2 sm:gap-3">
                                                <span className="bg-red-700 text-white font-mono font-bold text-[8px] sm:text-[10px] px-2 py-0.5 sm:px-3 sm:py-1 tracking-widest uppercase inline-block shadow-sm">Classified</span>
                                                <span className="text-slate-400 font-mono text-[8px] sm:text-[9px] uppercase font-bold tracking-widest">Property of VGU Intel</span>
                                            </div>
                                            <h1 className="text-2xl sm:text-5xl font-serif font-black text-[#00205B] uppercase leading-tight sm:leading-none tracking-tight">VGU Trial Lecture</h1>
                                            <p className="font-mono text-[9px] sm:text-[11px] font-bold text-slate-500 mt-2 sm:mt-3 uppercase tracking-wider sm:tracking-[0.2em] leading-tight">Faculty of Economics and Management // BBA & BFA Intelligence Unit</p>
                                        </div>
                                        
                                        <div className="relative p-1.5 border border-blue-800/30 text-blue-800/40 rounded rotate-[-5deg] font-mono text-[8px] sm:text-[10px] font-black uppercase tracking-tighter text-center self-end sm:self-auto">
                                            VGU ARCHIVE<br/>29 MAR 2026<br/>VERIFIED
                                        </div>

                                        <div className="w-full sm:w-auto text-left sm:text-right font-mono text-[9px] sm:text-[10px] text-slate-900 space-y-0.5 sm:space-y-1 border-t sm:border-t-0 pt-2 sm:pt-0 border-slate-100">
                                            <div className="flex justify-between sm:justify-end gap-4 uppercase"><span>File Ref:</span> <span className="font-black bg-yellow-100 px-1">VGU-STRAT-001</span></div>
                                            <div className="flex justify-between sm:justify-end gap-4 uppercase"><span>Sector:</span> <span className="font-black underline decoration-double">Ho Chi Minh</span></div>
                                        </div>
                                    </div>

                                    {view === 'map' && (
                                        <div className="flex-1 animate-fade relative">
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] select-none">
                                                <div className="text-[60px] sm:text-[120px] font-serif font-black -rotate-12 uppercase border-[6px] sm:border-[12px] border-slate-900 px-6 sm:px-12 leading-none">Internal</div>
                                            </div>

                                            <div className="mb-6 sm:mb-8">
                                                <h2 className="text-lg sm:text-2xl font-serif font-bold text-slate-900 flex items-center gap-2 sm:gap-3">
                                                    <span className="w-2 h-2 sm:w-3 sm:h-3 bg-[#00205B] rounded-full"></span>
                                                    Choose Your Sitting Area
                                                </h2>
                                                <p className="text-[10px] sm:text-[12px] text-slate-600 font-mono mt-2 sm:mt-3 ml-4 sm:ml-6 leading-relaxed max-w-lg italic uppercase font-bold">
                                                    "Select your sector to initialize the case briefing."
                                                </p>
                                            </div>

                                            <div className="bg-white rounded shadow-[inset_0_2px_10px_rgba(0,0,0,0.05)] border-[2px] sm:border-[3px] border-slate-200 p-4 sm:p-12 relative overflow-hidden">
                                                <div className="absolute inset-0 opacity-[0.05] sm:opacity-[0.1] pointer-events-none" style={{ backgroundImage: 'linear-gradient(#00205B 1px, transparent 1px), linear-gradient(90deg, #00205B 1px, transparent 1px)', backgroundSize: '16px 16px sm:background-size:24px 24px' }}></div>
                                                
                                                <div className="relative z-10">
                                                    <div className="w-full bg-slate-50 border border-slate-200 sm:border-2 sm:border-slate-300 py-2 sm:py-4 flex items-center justify-center mb-6 sm:mb-16 rounded-sm text-center">
                                                        <span className="text-slate-400 sm:text-slate-500 font-mono text-[8px] sm:text-xs font-black tracking-[0.3em] sm:tracking-[0.5em] uppercase">Lecturer Operations / Projection Screen</span>
                                                    </div>

                                                    <div className="grid grid-cols-[1fr,10px,1.4fr,10px,1fr] sm:grid-cols-[1fr,60px,1.6fr,60px,1fr] items-stretch gap-1 sm:gap-2">
                                                        <div className="flex flex-col gap-3 sm:gap-8">
                                                            <button onClick={() => startMission(MISSIONS[0])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-8 border sm:border-2 border-slate-900 bg-white active:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[9px] text-slate-400 group-active:text-blue-300 font-bold mb-1 uppercase tracking-tighter">Entrants</span>
                                                                <span className="text-slate-900 group-active:text-white text-[8px] sm:text-sm font-black uppercase text-center">F_Left</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[3])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-8 border sm:border-2 border-slate-900 bg-white active:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[9px] text-slate-400 group-active:text-blue-300 font-bold mb-1 uppercase tracking-tighter">Buyers</span>
                                                                <span className="text-slate-900 group-active:text-white text-[8px] sm:text-sm font-black uppercase text-center">B_Left</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l border-dashed border-slate-200"></div></div>
                                                        <div className="flex flex-col">
                                                            <button onClick={() => startMission(MISSIONS[2])} className="flex-1 group relative flex flex-col items-center justify-center px-1 py-6 sm:p-10 border-2 sm:border-4 border-slate-900 bg-slate-50 active:bg-slate-900 transition-all rounded-sm shadow-md">
                                                                <span className="font-mono text-[7px] sm:text-[11px] text-slate-400 group-active:text-blue-300 font-bold mb-1 sm:mb-2 tracking-widest sm:tracking-[0.4em] uppercase text-center">Suppliers</span>
                                                                <span className="text-slate-900 group-active:text-white text-[9px] sm:text-lg font-black uppercase text-center leading-tight">Central<br/>Axis</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l border-dashed border-slate-200"></div></div>
                                                        <div className="flex flex-col gap-3 sm:gap-8">
                                                            <button onClick={() => startMission(MISSIONS[1])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-8 border sm:border-2 border-slate-900 bg-white active:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[9px] text-slate-400 group-active:text-blue-300 font-bold mb-1 uppercase tracking-tighter">Substitutes</span>
                                                                <span className="text-slate-900 group-active:text-white text-[8px] sm:text-sm font-black uppercase text-center">F_Right</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[4])} className="group relative flex flex-col items-center justify-center py-4 px-1 sm:p-8 border sm:border-2 border-slate-900 bg-white active:bg-slate-900 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[6px] sm:text-[9px] text-slate-400 group-active:text-blue-300 font-bold mb-1 uppercase tracking-tighter">Competitors</span>
                                                                <span className="text-slate-900 group-active:text-white text-[8px] sm:text-sm font-black uppercase text-center">B_Right</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {view === 'dossier' && activeMission && (
                                        <div className="flex-1 animate-slide flex flex-col relative">
                                            <div className="absolute top-0 right-0 stamp border-[4px] sm:border-[6px] border-red-700/60 px-2 sm:px-4 py-0.5 sm:py-1 text-red-700/60 font-black text-lg sm:text-2xl uppercase tracking-tighter opacity-80 pointer-events-none z-0">
                                                Eyes Only
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-[1fr,260px] gap-6 sm:gap-10">
                                                <div className="space-y-6 sm:space-y-8">
                                                    <section>
                                                        <h3 className="text-[9px] sm:text-[11px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1">Your Corporate</h3>
                                                        <p className="text-2xl sm:text-4xl font-serif font-black text-[#00205B] flex flex-wrap items-center gap-2 sm:gap-3">
                                                            Mixue Ice Cream & Tea
                                                            <span className="text-[8px] sm:text-[10px] font-mono font-normal bg-red-100 text-red-800 border border-red-800 px-2 py-0.5 rounded-full">UNDER_THREAT</span>
                                                        </p>
                                                    </section>
                                                    <section>
                                                        <h3 className="text-[9px] sm:text-[11px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1">Your Threat</h3>
                                                        <div className="text-xl sm:text-3xl font-black text-slate-900 border-l-[4px] sm:border-l-[6px] border-slate-900 pl-3 sm:pl-4 py-1.5 sm:py-2 bg-slate-100/50">{activeMission.identity}</div>
                                                    </section>
                                                    <section className="bg-slate-100/70 p-4 sm:p-6 border-l-4 border-slate-300 shadow-sm relative">
                                                        <div className="absolute top-1 sm:top-2 right-2 sm:right-4 font-mono text-[7px] sm:text-[8px] text-slate-400 font-bold uppercase">Source: Intel</div>
                                                        <h3 className="text-[9px] sm:text-[11px] font-mono font-black text-slate-500 uppercase tracking-widest mb-2 sm:mb-3">Briefing Intel</h3>
                                                        <p className="text-slate-800 font-serif leading-relaxed text-[14px] sm:text-[16px]">{activeMission.intel}</p>
                                                    </section>
                                                    
                                                    {/* REDESIGNED MISSION SECTION FOR READABILITY */}
                                                    <section className="bg-white p-5 sm:p-8 border-2 sm:border-[4px] border-slate-900 shadow-xl relative overflow-hidden">
                                                        <div className="absolute top-0 left-0 bg-[#00205B] text-white px-3 py-1 font-mono text-[9px] sm:text-[10px] font-black uppercase tracking-widest">Your Mission Objective</div>
                                                        <div className="mt-4 sm:mt-6">
                                                            <p className="text-slate-900 font-serif font-black text-[16px] sm:text-[20px] leading-[1.4] tracking-tight">
                                                                {activeMission.mission}
                                                            </p>
                                                        </div>
                                                        <div className="mt-4 flex justify-end opacity-20">
                                                            <div className="font-handwriting text-[10px] sm:text-[12px] rotate-[-2deg]">Authorized by VGU_UNIT_01</div>
                                                        </div>
                                                    </section>
                                                </div>

                                                <div className="space-y-6 sm:space-y-8">
                                                    {/* REDESIGNED TEAM PROTOCOL FOR READABILITY */}
                                                    <div className="bg-[#fff9c4] p-5 sm:p-6 shadow-md border-2 border-yellow-400 relative">
                                                        <div className="absolute top-0 left-0 w-full h-1.5 bg-yellow-400"></div>
                                                        <h4 className="font-mono text-[10px] sm:text-[11px] font-black text-amber-900 uppercase mb-3 underline decoration-2 underline-offset-4 tracking-wider">Team Protocol</h4>
                                                        <p className="text-[14px] sm:text-[15px] font-bold text-amber-950 leading-relaxed font-serif">
                                                            Form a team of <span className="underline decoration-amber-900/30">15-20 personnel</span>. 
                                                        </p>
                                                        <ul className="mt-3 space-y-2 text-[13px] sm:text-[14px] font-bold text-amber-900 font-serif list-disc pl-4">
                                                            <li>Grouping: 2 Mins</li>
                                                            <li>Planning: 5 Mins</li>
                                                            <li>Deliverable: 2-Min Pitch</li>
                                                        </ul>
                                                    </div>

                                                    <div className="bg-white p-4 sm:p-6 rounded-sm border-2 border-slate-900 shadow-xl relative">
                                                        <div className="mb-3 sm:mb-4 border-b border-slate-100 pb-2 flex justify-between">
                                                            <span className="text-[8px] sm:text-[9px] font-mono font-black text-slate-400 uppercase tracking-widest uppercase">
                                                                Phase: {phase === 'grouping' ? 'Grouping' : 'Planning'}
                                                            </span>
                                                            <span className="text-[8px] sm:text-[9px] font-mono font-black text-blue-600 uppercase">Active</span>
                                                        </div>
                                                        <div className={`text-4xl sm:text-5xl font-mono font-black tracking-tighter text-center py-2 sm:py-3 border-y sm:border-y-2 border-slate-50 my-1 sm:my-2 ${timeLeft <= 10 ? 'text-red-600 animate-pulse' : phase === 'grouping' ? 'text-blue-700' : 'text-slate-900'}`}>{formatTime(timeLeft)}</div>
                                                        <div className="mt-4 sm:mt-6">
                                                            {phase === 'grouping' ? (
                                                                <button onClick={skipToPlanning} className="w-full py-3 sm:py-4 bg-slate-900 text-white text-[10px] sm:text-[11px] font-mono font-black uppercase active:scale-95 transition-all tracking-[0.2em] rounded-sm shadow-lg">Start Planning</button>
                                                            ) : (
                                                                <div className="flex flex-col items-center">
                                                                    <div className="w-full h-2 bg-slate-100 mb-3 overflow-hidden rounded-full">
                                                                        <div className="h-full bg-blue-600" style={{width: `${(timeLeft/300)*100}%`, transition: 'width 1s linear'}}></div>
                                                                    </div>
                                                                    <div className="text-[8px] text-center text-slate-400 font-mono py-1 uppercase font-black tracking-[0.2em] animate-pulse">Developing Tactics...</div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <button onClick={() => { setView('map'); window.scrollTo({ top: 0 }); }} className="w-full text-[10px] sm:text-[11px] font-mono font-black text-slate-400 active:text-slate-900 sm:hover:text-slate-900 uppercase tracking-widest py-3 border-t sm:border-t-2 border-slate-100 mt-2 sm:mt-4 transition-colors">
                                                        &lt;&lt; Sector Select
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Footer Section */}
                                    <div className="mt-auto pt-8 sm:pt-12 flex justify-between items-end gap-2">
                                        <div className="flex items-center gap-3 sm:gap-6">
                                            <div className="w-10 h-10 sm:w-16 sm:h-16 border-2 sm:border-[4px] border-slate-900 flex flex-col items-center justify-center text-slate-900 font-black leading-none bg-white shadow-sm">
                                                <span className="text-[6px] sm:text-[8px] font-mono uppercase">VGU</span>
                                                <span className="text-[12px] sm:text-[18px]">001</span>
                                            </div>
                                            <div className="hidden sm:block">
                                                <div className="text-[9px] font-mono font-black text-slate-800 uppercase tracking-widest">Authorization: PROF_SIG</div>
                                                <div className="w-32 h-0.5 bg-slate-300 mt-4"></div>
                                            </div>
                                        </div>
                                        
                                        <div className="text-right">
                                            <div className="text-[7px] sm:text-[9px] font-mono font-black text-slate-900 uppercase tracking-widest mb-0.5 sm:mb-1">VGU Faculty of Economics and Management</div>
                                            <div className="text-[7px] sm:text-[8px] font-mono text-slate-500 uppercase flex flex-wrap items-center justify-end gap-1 sm:gap-2">

                                                <span className="hidden sm:inline w-1 h-1 bg-slate-300 rounded-full"></span>
                                                <span>STRAT-OP-2026</span>

                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="absolute -bottom-2 -right-2 sm:-bottom-4 sm:-right-4 w-full h-full bg-black/20 -z-10 rounded-2xl blur-lg sm:blur-xl"></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
