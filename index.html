<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGU Trial Lecture | Case File #001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:wght@400;700&display=swap');
        
        body { background-color: #0f172a; }
        .font-handwriting { font-family: 'Permanent Marker', cursive; }
        .font-mono { font-family: 'Courier Prime', monospace; }
        
        /* Skeuomorphic Textures */
        .paper-noise {
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .folder-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23f)' opacity='0.1'/%3E%3C/svg%3E");
        }

        /* Folder Tab Shape */
        .tab-shape {
            clip-path: polygon(0% 100%, 15% 0%, 85% 0%, 100% 100%);
        }

        /* Rubber Stamp Effect */
        .stamp {
            transform: rotate(-12deg);
            mix-blend-mode: multiply;
            mask-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence baseFrequency='0.5'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23f)'/%3E%3C/svg%3E");
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-fade { animation: fade-in 0.5s ease-out forwards; }
        .animate-slide { animation: slide-in 0.5s ease-out forwards; }

        .staple {
            background: linear-gradient(90deg, #94a3b8 0%, #cbd5e1 50%, #94a3b8 100%);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MISSIONS = [
            { id: "alpha", identity: "Threat of New Entrants", intel: "Mixue is highly profitable. They have established high 'barriers to entry' including prime real estate, massive supply chains, and a loyal customer base.", mission: "Bypass their defenses. Formulate 2 creative strategies to launch a rival brand and capture their market share WITHOUT requiring massive upfront capital." },
            { id: "bravo", identity: "Threat of Substitutes", intel: "You intend to capture Mixue's market share, but you are strictly prohibited from selling milk tea, ice cream, or direct beverage equivalents.", mission: "Make their core product irrelevant. Formulate a completely different product or experience that serves the exact same consumer need. How do you divert their Gen-Z demographic?" },
            { id: "charlie", identity: "Bargaining Power of Suppliers", intel: "You control the only supply chain in the city capable of producing their signature tea leaves and ingredients. Mixue is entirely dependent on your shipments to operate.", mission: "Maximize your margins. Formulate 2 aggressive operational strategies to extract more revenue from Mixue without forcing the company into immediate bankruptcy." },
            { id: "delta", identity: "Bargaining Power of Buyers", intel: "You influence the purchasing decisions of thousands of local students via social media. You are no longer willing to pay current prices for their products.", mission: "Manipulate the market dynamics. Formulate a strategy to organize the buyer base and force Mixue to implement aggressive discounts or VIP tiers. What leverage will you use?" },
            { id: "echo", identity: "Rivalry Among Existing Competitors", intel: "You are the primary direct competitor to Mixue, located on the exact same street. Your goal is to acquire 50% of their daily foot traffic this month.", mission: "You CANNOT initiate a price war (this destroys profit margins). Formulate 2 strategies to outcompete them based on differentiation or superior value, not lower prices." }
        ];

        function App() {
            const [view, setView] = useState('map');
            const [activeMission, setActiveMission] = useState(null);
            const [phase, setPhase] = useState('grouping');
            const [timeLeft, setTimeLeft] = useState(120);
            const timerRef = useRef(null);

            const startMission = (mission) => {
                setActiveMission(mission);
                setPhase('grouping');
                setTimeLeft(120);
                setView('dossier');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            useEffect(() => {
                if (view === 'dossier') {
                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                if (phase === 'grouping') {
                                    setPhase('pitching');
                                    return 300;
                                } else {
                                    clearInterval(timerRef.current);
                                    return 0;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [view, phase]);

            const skipToPitching = () => {
                setPhase('pitching');
                setTimeLeft(300);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 sm:p-12 font-sans selection:bg-blue-200 overflow-x-hidden">
                    <div className="relative w-full max-w-4xl">
                        
                        {/* Staggered Folder Tab */}
                        <div className="absolute -top-8 left-12 w-48 h-10 bg-[#00205B] tab-shape z-0 flex items-center justify-center shadow-lg border-t border-blue-400/20">
                            <span className="text-[#faf9f6]/40 font-mono text-[10px] tracking-[0.3em] font-bold uppercase mt-1">STRAT_LOG_001</span>
                        </div>

                        {/* Folder Body */}
                        <div className="relative bg-[#00205B] rounded-tr-3xl rounded-br-2xl rounded-bl-2xl shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)] overflow-hidden border-l-[16px] border-[#00153d]">
                            <div className="absolute inset-0 folder-texture pointer-events-none"></div>
                            
                            <div className="p-2 sm:p-6">
                                {/* The Paper Content */}
                                <div className="relative bg-[#faf9f6] rounded-sm shadow-2xl min-h-[700px] flex flex-col p-6 sm:p-16 border-t border-white/50">
                                    <div className="absolute inset-0 pointer-events-none paper-noise"></div>
                                    
                                    {/* Metallic Staples */}
                                    <div className="absolute top-6 left-12 w-6 h-1.5 staple rounded-sm rotate-[-15deg] z-10"></div>
                                    <div className="absolute top-8 left-12 w-6 h-1.5 staple rounded-sm rotate-[-12deg] z-10"></div>
                                    
                                    {/* Paperclip Tag */}
                                    <div className="absolute top-[-10px] right-20 z-20 transform hover:scale-105 transition-transform cursor-default">
                                        {/* Metallic Clip Effect */}
                                        <div className="absolute top-0 right-1/2 w-4 h-16 border-4 border-slate-400 rounded-full opacity-60"></div>
                                        <div className="relative bg-red-800 text-white px-3 py-1 font-mono text-[10px] font-black uppercase tracking-tighter shadow-md rotate-3 flex items-center gap-2 border border-red-900">
                                            <div className="w-1.5 h-1.5 bg-white rounded-full"></div>
                                            Confidential
                                        </div>
                                    </div>

                                    {/* Header Section */}
                                    <div className="border-b-[3px] border-slate-900 pb-8 mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-6 relative">
                                        <div className="w-full">
                                            <div className="mb-3 flex items-center gap-3">
                                                <span className="bg-red-700 text-white font-mono font-bold text-[10px] px-3 py-1 tracking-widest uppercase inline-block shadow-sm">Classified</span>
                                                <span className="text-slate-400 font-mono text-[9px] uppercase font-bold tracking-widest">Property of VGU Intel</span>
                                            </div>
                                            <h1 className="text-3xl sm:text-5xl font-serif font-black text-[#00205B] uppercase leading-none tracking-tight">VGU Trial Lecture</h1>
                                            <p className="font-mono text-[10px] sm:text-[11px] font-bold text-slate-500 mt-3 uppercase tracking-[0.2em] leading-tight">Faculty of Economics and Management // BBA & BFA Intelligence Unit</p>
                                        </div>
                                        
                                        {/* Official Date Stamp */}
                                        <div className="relative p-2 border-2 border-blue-800/30 text-blue-800/40 rounded rotate-[-5deg] font-mono text-[10px] font-black uppercase tracking-tighter text-center">
                                            VGU ARCHIVE<br/>29 MAR 2026<br/>VERIFIED
                                        </div>

                                        <div className="w-full sm:w-auto text-left sm:text-right font-mono text-[10px] text-slate-900 space-y-1">
                                            <div className="flex justify-between sm:justify-end gap-4 uppercase"><span>File Ref:</span> <span className="font-black bg-yellow-100 px-1">VGU-STRAT-001</span></div>
                                            <div className="flex justify-between sm:justify-end gap-4 uppercase"><span>Sector:</span> <span className="font-black underline decoration-double">Ho Chi Minh</span></div>
                                        </div>
                                    </div>

                                    {view === 'map' && (
                                        <div className="flex-1 animate-fade relative">
                                            {/* Large "TOP SECRET" Watermark */}
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] select-none">
                                                <div className="text-[120px] font-serif font-black -rotate-12 uppercase border-[12px] border-slate-900 px-12 leading-none">Internal</div>
                                            </div>

                                            <div className="mb-8">
                                                <h2 className="text-xl sm:text-2xl font-serif font-bold text-slate-900 flex items-center gap-3">
                                                    <span className="w-3 h-3 bg-[#00205B] rounded-full"></span>
                                                    Choose Your Sitting Area
                                                </h2>
                                                <p className="text-[11px] sm:text-[12px] text-slate-600 font-mono mt-3 ml-6 leading-relaxed max-w-lg italic">
                                                    "Select your sector to initialize the case briefing."
                                                </p>
                                            </div>

                                            <div className="bg-white rounded shadow-[inset_0_2px_10px_rgba(0,0,0,0.05)] border-[3px] border-slate-200 p-6 sm:p-12 relative overflow-hidden">
                                                <div className="absolute inset-0 opacity-[0.1] pointer-events-none" style={{ backgroundImage: 'linear-gradient(#00205B 1px, transparent 1px), linear-gradient(90deg, #00205B 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                                                
                                                <div className="relative z-10">
                                                    <div className="w-full bg-slate-100 border-2 border-slate-300 py-4 flex items-center justify-center mb-8 sm:mb-16 rounded-sm text-center">
                                                        <span className="text-slate-500 font-mono text-[10px] sm:text-xs font-black tracking-[0.5em] uppercase">Lecturer Operations / Projection Screen</span>
                                                    </div>

                                                    <div className="grid grid-cols-[1fr,20px,1.4fr,20px,1fr] sm:grid-cols-[1fr,60px,1.6fr,60px,1fr] items-stretch gap-2">
                                                        <div className="flex flex-col gap-4 sm:gap-8">
                                                            <button onClick={() => startMission(MISSIONS[0])} className="group relative flex flex-col items-center justify-center py-6 px-2 sm:p-8 border-2 border-slate-900 bg-white hover:bg-slate-900 hover:text-white hover:scale-[1.02] active:scale-95 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[7px] sm:text-[9px] text-slate-400 group-hover:text-blue-300 font-bold mb-1 tracking-widest uppercase">Sec_Alpha</span>
                                                                <span className="text-slate-900 group-hover:text-white text-[10px] sm:text-sm font-black uppercase text-center">Front Left</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[3])} className="group relative flex flex-col items-center justify-center py-6 px-2 sm:p-8 border-2 border-slate-900 bg-white hover:bg-slate-900 hover:text-white hover:scale-[1.02] active:scale-95 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[7px] sm:text-[9px] text-slate-400 group-hover:text-blue-300 font-bold mb-1 tracking-widest uppercase">Sec_Delta</span>
                                                                <span className="text-slate-900 group-hover:text-white text-[10px] sm:text-sm font-black uppercase text-center">Back Left</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l-2 border-dashed border-slate-200"></div></div>
                                                        <div className="flex flex-col">
                                                            <button onClick={() => startMission(MISSIONS[2])} className="flex-1 group relative flex flex-col items-center justify-center px-2 py-8 sm:p-10 border-4 border-slate-900 bg-slate-50 hover:bg-slate-900 hover:text-white hover:scale-[1.02] active:scale-95 transition-all rounded-sm shadow-md">
                                                                <span className="font-mono text-[8px] sm:text-[11px] text-slate-400 group-hover:text-blue-300 font-bold mb-2 tracking-[0.4em] uppercase">Sec_Charlie</span>
                                                                <span className="text-slate-900 group-hover:text-white text-[12px] sm:text-lg font-black uppercase text-center leading-tight">Central Command</span>
                                                            </button>
                                                        </div>
                                                        <div className="flex items-center justify-center"><div className="h-full border-l-2 border-dashed border-slate-200"></div></div>
                                                        <div className="flex flex-col gap-4 sm:gap-8">
                                                            <button onClick={() => startMission(MISSIONS[1])} className="group relative flex flex-col items-center justify-center py-6 px-2 sm:p-8 border-2 border-slate-900 bg-white hover:bg-slate-900 hover:text-white hover:scale-[1.02] active:scale-95 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[7px] sm:text-[9px] text-slate-400 group-hover:text-blue-300 font-bold mb-1 tracking-widest uppercase">Sec_Bravo</span>
                                                                <span className="text-slate-900 group-hover:text-white text-[10px] sm:text-sm font-black uppercase text-center">Front Right</span>
                                                            </button>
                                                            <button onClick={() => startMission(MISSIONS[4])} className="group relative flex flex-col items-center justify-center py-6 px-2 sm:p-8 border-2 border-slate-900 bg-white hover:bg-slate-900 hover:text-white hover:scale-[1.02] active:scale-95 transition-all rounded-sm shadow-sm">
                                                                <span className="font-mono text-[7px] sm:text-[9px] text-slate-400 group-hover:text-blue-300 font-bold mb-1 tracking-widest uppercase">Sec_Echo</span>
                                                                <span className="text-slate-900 group-hover:text-white text-[10px] sm:text-sm font-black uppercase text-center">Back Right</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {view === 'dossier' && activeMission && (
                                        <div className="flex-1 animate-slide flex flex-col relative">
                                            {/* Red Hand-Stamped "EYES ONLY" Stamp */}
                                            <div className="absolute top-0 right-0 stamp border-[6px] border-red-700/80 px-4 py-1 text-red-700/80 font-black text-2xl uppercase tracking-tighter opacity-80 pointer-events-none z-0">
                                                Eyes Only
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-[1fr,260px] gap-10">
                                                <div className="space-y-8">
                                                    <section>
                                                        <h3 className="text-[10px] sm:text-[11px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1">Target Entity</h3>
                                                        <p className="text-3xl sm:text-4xl font-serif font-black text-[#00205B] flex items-center gap-3">
                                                            Mixue Ice Cream & Tea
                                                            <span className="text-[10px] font-mono font-normal bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">ACTIVE_THREAT</span>
                                                        </p>
                                                    </section>
                                                    <section>
                                                        <h3 className="text-[10px] sm:text-[11px] font-mono font-black text-slate-400 uppercase tracking-widest mb-1">Assigned Framework</h3>
                                                        <div className="text-2xl sm:text-3xl font-black text-slate-900 border-l-[6px] border-slate-900 pl-4 py-2 bg-slate-100/50">{activeMission.identity}</div>
                                                    </section>
                                                    <section className="bg-slate-100/70 p-6 border-l-4 border-slate-300 shadow-sm relative">
                                                        <div className="absolute top-2 right-4 font-mono text-[8px] text-slate-400 font-bold uppercase">Source: Ground Intel</div>
                                                        <h3 className="text-[10px] sm:text-[11px] font-mono font-black text-slate-500 uppercase tracking-widest mb-3">Intelligence Briefing</h3>
                                                        <p className="text-slate-800 font-serif leading-relaxed text-[14px] sm:text-[15px]">{activeMission.intel}</p>
                                                    </section>
                                                    <section className="bg-white p-6 sm:p-8 border-[3px] border-slate-900 shadow-xl relative">
                                                        <div className="absolute -top-3 left-4 bg-[#00205B] text-white px-3 py-1 font-mono text-[9px] font-black uppercase">Mission Objective</div>
                                                        <p className="font-bold text-slate-900 text-sm sm:text-base leading-relaxed italic font-handwriting">"{activeMission.mission}"</p>
                                                    </section>
                                                </div>

                                                <div className="space-y-8">
                                                    <div className="bg-[#fefce8] p-6 shadow-md border-2 border-yellow-300 relative overflow-hidden">
                                                        <div className="absolute top-0 right-0 p-1 opacity-10">
                                                            <svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.45l8.15 14.1H3.85L12 5.45zM11 16h2v2h-2v-2zm0-7h2v5h-2V9z" fill="currentColor"/></svg>
                                                        </div>
                                                        <h4 className="font-mono text-[10px] font-black text-amber-900 uppercase mb-3 underline decoration-2 underline-offset-4">Field Protocol</h4>
                                                        <p className="text-[13px] font-handwriting text-amber-950 font-semibold leading-relaxed">
                                                            Organize into a Cell (2-3 personnel). Synthesize a concise strategic pitch for the board. You have limited time.
                                                        </p>
                                                    </div>

                                                    <div className="bg-white p-6 rounded-sm border-2 border-slate-900 shadow-xl relative">
                                                        <div className="mb-4 border-b border-slate-100 pb-2 flex justify-between">
                                                            <span className="text-[9px] font-mono font-black text-slate-400 uppercase tracking-widest">Operation Clock</span>
                                                            <span className="text-[9px] font-mono font-black text-blue-600 uppercase">{phase === 'grouping' ? 'Planning' : 'Execution'}</span>
                                                        </div>
                                                        <div className={`text-5xl font-mono font-black tracking-tighter text-center py-3 border-y-2 border-slate-50 my-2 ${timeLeft <= 10 ? 'text-red-600 animate-pulse' : phase === 'grouping' ? 'text-blue-700' : 'text-slate-900'}`}>{formatTime(timeLeft)}</div>
                                                        <div className="mt-6">
                                                            {phase === 'grouping' ? (
                                                                <button onClick={skipToPitching} className="w-full py-4 bg-slate-900 text-white text-[11px] font-mono font-black uppercase hover:bg-slate-800 active:scale-95 transition-all tracking-[0.2em] rounded-sm shadow-lg">Finalize Strategy</button>
                                                            ) : (
                                                                <div className="flex flex-col items-center">
                                                                    <div className="w-full h-1 bg-slate-100 mb-4 overflow-hidden">
                                                                        <div className="h-full bg-blue-600 animate-[loading_5s_linear_infinite]" style={{width: '60%'}}></div>
                                                                    </div>
                                                                    <div className="text-[9px] text-center text-slate-400 font-mono py-2 uppercase font-black tracking-[0.3em] animate-pulse">Analysis in Progress</div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <button onClick={() => { setView('map'); window.scrollTo({ top: 0 }); }} className="w-full text-[11px] font-mono font-black text-slate-400 hover:text-slate-900 uppercase tracking-widest py-4 border-t-2 border-slate-100 mt-4 transition-colors">
                                                        &lt;&lt; Return to Schematic
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Footer Section */}
                                    <div className="mt-auto pt-12 flex justify-between items-end">
                                        <div className="flex items-center gap-6">
                                            <div className="w-16 h-16 border-[4px] border-slate-900 flex flex-col items-center justify-center text-slate-900 font-black leading-none bg-white shadow-sm">
                                                <span className="text-[8px] font-mono uppercase">VGU</span>
                                                <span className="text-[18px]">001</span>
                                            </div>
                                            <div className="hidden sm:block">
                                                <div className="text-[9px] font-mono font-black text-slate-800 uppercase tracking-widest">Authorization: PROF_SIG_REQUIRED</div>
                                                <div className="w-32 h-0.5 bg-slate-300 mt-4"></div>
                                            </div>
                                        </div>
                                        
                                        <div className="text-right">
                                            <div className="text-[8px] sm:text-[9px] font-mono font-black text-slate-900 uppercase tracking-widest mb-1">VGU Faculty of Economics and Management</div>
                                            <div className="text-[8px] font-mono text-slate-500 uppercase flex items-center justify-end gap-2">
                                                <span>BBA & BFA Intelligence Div</span>
                                                <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                                <span>STRAT-OP-2026</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Staggered Shadow behind folder */}
                        <div className="absolute -bottom-4 -right-4 w-full h-full bg-black/20 -z-10 rounded-2xl blur-xl"></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
